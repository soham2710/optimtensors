name: CI

on:
  push:
    branches: [main, dcp-integration]
  pull_request:
    branches: [main]

jobs:
  test:
    name: core / py${{ matrix.python-version }} / torch ${{ matrix.torch-version || 'latest' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        torch-version: [""]  # latest stable
        include:
          # oldest torch we test against (torch 2.1 is the last with py3.8 wheels;
          # we test it on 3.10 as the floor combination)
          - python-version: "3.10"
            torch-version: "2.1.*"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install torch (CPU)
        run: |
          if [ -n "${{ matrix.torch-version }}" ]; then
            pip install "torch==${{ matrix.torch-version }}" --index-url https://download.pytorch.org/whl/cpu
          else
            pip install torch --index-url https://download.pytorch.org/whl/cpu
          fi

      - name: Install package
        run: pip install -e .[dev]

      - name: Run tests
        run: pytest tests/ -q

  test-integrations:
    name: transformers integration / py3.12
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install torch (CPU)
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install package with transformers extras
        run: pip install -e .[dev,transformers]

      - name: Run tests
        run: pytest tests/ -q
